name: Deploy to Hostinger

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ""

      - name: Create PHP local config
        run: |
          cat > dist/api/config.local.php <<'PHP'
          <?php
          declare(strict_types=1);

          return [
              'DB_HOST' => '${{ secrets.DB_HOST }}',
              'DB_NAME' => '${{ secrets.DB_NAME }}',
              'DB_USER' => '${{ secrets.DB_USER }}',
              'DB_PASS' => '${{ secrets.DB_PASS }}',
              'DB_CHARSET' => 'utf8mb4',
              'ADMIN_EMAIL' => 'Spares@gmail.com',
              'ADMIN_PASSWORD_HASH' => '$2y$10$KQITQGYBDFLrXFLGr8X90.hh.SwhHX6/2CjHH9M6l35W5/.MzFxg.',
              'AUTH_SECRET' => '${{ secrets.AUTH_SECRET }}',
              'ALLOWED_ORIGIN' => 'https://spares.salvinindia.com',
              'MAX_UPLOAD_BYTES' => '5242880',
          ];
          PHP

      - name: Deploy to public_html/spares
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/spares/
          dangerous-clean-slate: false
