name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://spares.salvinindia.com/api
          VITE_UPLOAD_BASE_URL: https://spares.salvinindia.com/api/uploads

      - name: Validate deployment secrets
        run: |
          test -n "${DB_HOST}"
          test -n "${DB_NAME}"
          test -n "${DB_USER}"
          test -n "${DB_PASSWORD}"
          test -n "${AUTH_SECRET}"
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER || secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD || secrets.DB_PASS }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

      - name: Create PHP env file
        run: |
          cat > dist/api/.env <<'ENV'
          DB_HOST=${{ secrets.DB_HOST }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER || secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD || secrets.DB_PASS }}
          DB_CHARSET=utf8mb4
          ADMIN_EMAIL=spares@gmail.com
          ADMIN_PASSWORD=spares@123
          AUTH_SECRET=${{ secrets.AUTH_SECRET }}
          ALLOWED_ORIGIN=https://spares.salvinindia.com
          MAX_UPLOAD_SIZE=5242880
          UPLOAD_PATH=../uploads
          UPLOAD_URL=https://spares.salvinindia.com/api/uploads
          ENV

      - name: Deploy to FTP root
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SPARES_FTP_SERVER }}
          username: ${{ secrets.SPARES_FTP_USERNAME }}
          password: ${{ secrets.SPARES_FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./
          dangerous-clean-slate: false
